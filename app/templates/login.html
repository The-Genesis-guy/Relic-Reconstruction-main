<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Relic Reconstruction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>

<body>
    <div class="login-container glass-card fade-in">
        <div class="logo">
            <h1>Relic Reconstruction</h1>
            <p>Welcome back! Please login to continue</p>
        </div>

        {% if error %}
        <div class="error-msg pulse">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="login-form">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <input type="text" name="username" class="form-input" required autofocus
                        placeholder="Enter your username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="form-input" required
                        placeholder="Enter your password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <span>Login to Sanctuary</span>
                <div class="btn-glow"></div>
            </button>
        </form>

        <div class="info-box">
            <p>Don't have an account? <span class="highlight">Contact admin</span> to initialize your reconstruction
                portal.</p>
        </div>
    </div>
</body>

</html>
